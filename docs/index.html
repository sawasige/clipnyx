<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipnyx — クリップボード履歴マネージャー for macOS</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="description" content="Clipnyx はmacOSメニューバーに常駐するクリップボード履歴マネージャーです。コピー履歴を自動保存し、ホットキーで瞬時にアクセス。">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-surface: #f5f5f7;
      --color-text: #1d1d1f;
      --color-text-secondary: #86868b;
      --color-accent: #0071e3;
      --color-accent-hover: #0077ed;
      --color-border: #d2d2d7;
      --color-card-bg: #ffffff;
      --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #000000;
        --color-surface: #1c1c1e;
        --color-text: #f5f5f7;
        --color-text-secondary: #86868b;
        --color-accent: #2997ff;
        --color-accent-hover: #40a9ff;
        --color-border: #38383a;
        --color-card-bg: #1c1c1e;
        --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.3);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 120px 24px 100px;
    }

    .hero-icon {
      margin-bottom: 24px;
      display: block;
    }

    .hero-icon img {
      width: 160px;
      height: 160px;
      border-radius: 36px;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 16px;
    }

    .hero .tagline {
      font-size: 24px;
      font-weight: 400;
      color: var(--color-text-secondary);
      max-width: 560px;
      margin: 0 auto 48px;
      line-height: 1.4;
    }

    .app-store-badge {
      display: inline-block;
      transition: opacity 0.2s;
    }

    .app-store-badge:hover {
      opacity: 0.8;
    }

    .app-store-badge img {
      height: 40px;
      vertical-align: middle;
    }

    .download-buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .dmg-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      height: 40px;
      padding: 0 13px 0 8px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 7px;
      border: 0.5px solid #a6a6a6;
      transition: opacity 0.2s;
    }

    @media (prefers-color-scheme: dark) {
      .dmg-badge {
        background: #fff;
        color: #000;
        border-color: #fff;
      }
    }

    .dmg-badge:hover {
      opacity: 0.8;
    }

    .dmg-badge svg {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      fill: currentColor;
    }

    .dmg-badge-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .dmg-badge-label {
      font-size: 8.5px;
      font-weight: 500;
    }

    .dmg-badge-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .install-hint {
      margin-top: 32px;
      text-align: center;
    }

    .install-hint p {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }

    .install-hint-cmd {
      display: inline-flex;
      align-items: center;
      gap: 0;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
    }

    .install-hint-cmd code {
      padding: 8px 12px;
      font-family: "SF Mono", SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      color: var(--color-text);
      user-select: all;
      cursor: text;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 100%;
      padding: 8px 0;
      background: none;
      border: none;
      border-left: 1px solid var(--color-border);
      cursor: pointer;
      color: var(--color-text-secondary);
      transition: color 0.2s;
    }

    .copy-btn:hover {
      color: var(--color-text);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Screenshot */
    .screenshot {
      text-align: center;
      padding: 0 24px 80px;
    }

    .screenshot img {
      max-width: 720px;
      width: 100%;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      .screenshot img {
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }
    }

    /* Features */
    .features {
      padding: 80px 0;
    }

    .features-heading {
      text-align: center;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 56px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }

    .feature-card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: 40px 32px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .feature-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .feature-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
    }

    .feature-card h3 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: 16px;
      color: var(--color-text-secondary);
      line-height: 1.6;
    }

    /* Editions */
    .editions {
      padding: 80px 0;
    }

    .editions-heading {
      text-align: center;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .editions-sub {
      text-align: center;
      font-size: 18px;
      color: var(--color-text-secondary);
      margin-bottom: 48px;
    }

    .editions-table {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      border-collapse: collapse;
    }

    .editions-table th,
    .editions-table td {
      padding: 14px 20px;
      text-align: center;
      font-size: 15px;
      border-bottom: 1px solid var(--color-border);
    }

    .editions-table th:first-child,
    .editions-table td:first-child {
      text-align: left;
      font-weight: 500;
    }

    .editions-table thead th {
      font-size: 16px;
      font-weight: 600;
      padding-bottom: 16px;
    }

    .editions-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--color-border);
      padding: 32px 0;
      margin-top: 40px;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
    }

    .footer-links a,
    .lang-toggle {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }

    .footer-links a:hover,
    .lang-toggle:hover {
      color: var(--color-accent);
    }

    .lang-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .copyright {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero {
        padding: 80px 24px 60px;
      }

      .hero h1 {
        font-size: 40px;
      }

      .hero .tagline {
        font-size: 20px;
      }

      .features-heading {
        font-size: 32px;
      }

      .features-grid {
        grid-template-columns: 1fr;
      }

      .editions-heading {
        font-size: 32px;
      }
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 32px;
      }

      .hero .tagline {
        font-size: 18px;
      }

      .feature-card {
        padding: 32px 24px;
      }

      .footer-inner {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <picture class="hero-icon">
      <source srcset="icon-dark.png" media="(prefers-color-scheme: dark)">
      <img src="icon-light.png" alt="Clipnyx" width="160" height="160">
    </picture>
    <h1>Clipnyx</h1>
    <p class="tagline" data-ja="macOSメニューバーに常駐する、軽量クリップボード履歴マネージャー。" data-en="A lightweight clipboard history manager that lives in your macOS menu bar."></p>
    <div class="download-buttons">
      <a class="app-store-badge" href="https://apps.apple.com/jp/app/clipnyx/id6759652985" aria-label="Download on the App Store">
        <picture>
          <source srcset="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/white/ja-jp" media="(prefers-color-scheme: dark)">
          <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp" alt="Download on the App Store">
        </picture>
      </a>
      <a class="dmg-badge" href="https://github.com/sawasige/clipnyx/releases/latest/download/Clipnyx.dmg">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <span class="dmg-badge-text">
          <span class="dmg-badge-label" data-ja="ダウンロード" data-en="Download"></span>
          <span class="dmg-badge-title">Clipnyx.dmg</span>
        </span>
      </a>
    </div>
    <div class="install-hint">
      <p data-ja="Homebrew でもインストールできます:" data-en="Also available via Homebrew:"></p>
      <span class="install-hint-cmd">
        <code>brew install sawasige/clipnyx/clipnyx</code>
        <button class="copy-btn" onclick="copyBrewCmd()" aria-label="Copy">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
      </span>
    </div>
  </section>

  <!-- Screenshot -->
  <section class="screenshot">
    <img src="screenshot-ja.png" alt="Clipnyx の履歴パネル" data-src-ja="screenshot-ja.png" data-src-en="screenshot-en.png" data-alt-ja="Clipnyx の履歴パネル" data-alt-en="Clipnyx history panel">
  </section>

  <!-- Features -->
  <section class="features">
    <div class="container">
      <h2 class="features-heading" data-ja="できること" data-en="Features"></h2>
      <div class="features-grid">
        <div class="feature-card">
          <span class="feature-icon" aria-hidden="true">🕐</span>
          <h3 data-ja="クリップボード履歴" data-en="Clipboard History"></h3>
          <p data-ja="コピーした内容を自動で保存。テキスト・画像・ファイルなど、あらゆる種類のデータに対応します。" data-en="Automatically saves everything you copy. Supports text, images, files, and more."></p>
        </div>
        <div class="feature-card">
          <span class="feature-icon" aria-hidden="true">⌨️</span>
          <h3 data-ja="ホットキーで瞬時アクセス" data-en="Instant Hotkey Access"></h3>
          <p data-ja="グローバルホットキーで履歴パネルを即座に表示。どのアプリを使っていてもすぐにペーストできます。" data-en="Bring up the history panel instantly with a global hotkey. Paste from any app, anytime."></p>
        </div>
        <div class="feature-card">
          <span class="feature-icon" aria-hidden="true">⭐</span>
          <h3 data-ja="お気に入り＆フォルダ" data-en="Favorites &amp; Folders"></h3>
          <p data-ja="よく使うアイテムをお気に入り登録し、ユーザー定義のフォルダで整理。Tab/Shift+Tabでフォルダを素早く切り替えられます。" data-en="Save frequently used items as favorites and organize them into custom folders. Switch folders quickly with Tab/Shift+Tab."></p>
        </div>
        <div class="feature-card">
          <span class="feature-icon" aria-hidden="true">📚</span>
          <h3 data-ja="コレクション画面" data-en="Collection View"></h3>
          <p data-ja="全データを一覧管理。サイドバーで全履歴・お気に入り・フォルダを切り替え、テキスト編集や新規追加もできます。" data-en="Manage all your data in one place. Browse history, favorites, and folders in the sidebar. Edit text or add new items directly."></p>
        </div>
        <div class="feature-card">
          <span class="feature-icon" aria-hidden="true">🏷️</span>
          <h3 data-ja="自動カテゴリ分類" data-en="Auto Categorization"></h3>
          <p data-ja="URL、コード、カラーコード、電話番号など11カテゴリに自動分類。必要な情報をすぐに見つけられます。" data-en="Automatically categorizes into 11 types — URLs, code, color codes, phone numbers, and more."></p>
        </div>
        <div class="feature-card">
          <span class="feature-icon" aria-hidden="true">🔒</span>
          <h3 data-ja="プライバシー重視" data-en="Privacy First"></h3>
          <p data-ja="クリップボードデータはすべてMac上にローカル保存。外部サーバーへの送信やトラッキングは一切ありません。" data-en="All clipboard data stays on your Mac. No data is sent to external servers, no tracking, no data collection."></p>
        </div>
      </div>
    </div>
  </section>

  <!-- Editions -->
  <section class="editions">
    <div class="container">
      <h2 class="editions-heading" data-ja="2つのエディション" data-en="Two Editions"></h2>
      <p class="editions-sub" data-ja="用途に合わせてお選びください。" data-en="Choose the one that fits your needs."></p>
      <table class="editions-table">
        <thead>
          <tr>
            <th></th>
            <th>App Store</th>
            <th>Full (.dmg)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-ja="配布元" data-en="Distribution"></td>
            <td>Mac App Store</td>
            <td>Homebrew / .dmg</td>
          </tr>
          <tr>
            <td data-ja="サンドボックス" data-en="Sandbox"></td>
            <td data-ja="あり" data-en="Yes"></td>
            <td data-ja="あり" data-en="Yes"></td>
          </tr>
          <tr>
            <td data-ja="ダイレクトペースト" data-en="Direct Paste"></td>
            <td>✓</td>
            <td>✓</td>
          </tr>
          <tr>
            <td data-ja="自動アップデート" data-en="Auto Update"></td>
            <td>App Store</td>
            <td>Sparkle / brew</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <div class="footer-links">
          <a href="privacy-policy.html" data-ja="プライバシーポリシー" data-en="Privacy Policy"></a>
          <a href="https://github.com/sawasige/clipnyx" data-ja="GitHub" data-en="GitHub">GitHub</a>
          <button class="lang-toggle" onclick="toggleLang()" aria-label="Switch language">EN / 日本語</button>
        </div>
        <span class="copyright">&copy; 2026 Clipnyx</span>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      var lang = 'ja';
      var elements = document.querySelectorAll('[data-ja]');

      function applyLang(l) {
        lang = l;
        elements.forEach(function (el) {
          el.textContent = el.getAttribute('data-' + lang);
        });
        document.querySelectorAll('[data-alt-' + lang + ']').forEach(function (el) {
          el.alt = el.getAttribute('data-alt-' + lang);
        });
        document.querySelectorAll('[data-src-' + lang + ']').forEach(function (el) {
          el.src = el.getAttribute('data-src-' + lang);
        });
        document.documentElement.lang = lang;
        // Update App Store badge language
        var img = document.querySelector('.app-store-badge img');
        var source = document.querySelector('.app-store-badge source');
        if (img && source) {
          var locale = lang === 'ja' ? 'ja-jp' : 'en-us';
          img.src = 'https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/' + locale;
          source.srcset = 'https://tools.applemediaservices.com/api/badges/download-on-the-app-store/white/' + locale;
        }
      }

      window.toggleLang = function () {
        applyLang(lang === 'ja' ? 'en' : 'ja');
      };

      var initialLang = (navigator.language || '').startsWith('ja') ? 'ja' : 'en';
      applyLang(initialLang);
    })();

    function copyBrewCmd() {
      navigator.clipboard.writeText('brew install sawasige/clipnyx/clipnyx');
      var btn = document.querySelector('.copy-btn');
      btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="currentColor"/></svg>';
      setTimeout(function () {
        btn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/></svg>';
      }, 1500);
    }
  </script>

</body>
</html>
