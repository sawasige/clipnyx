name: Release Full (Homebrew)

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-26
    permissions:
      contents: write
      actions: write

    env:
      APP_NAME: Clipnyx
      SCHEME: Clipnyx-Full
      CONFIGURATION: Release-Full
      PROJECT_PATH: Clipnyx/Clipnyx.xcodeproj

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 証明書インポート ──
      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$DEVELOPER_ID_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$DEVELOPER_ID_P12_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── バージョン読み取り ──
      - name: Read version from project
        run: |
          VERSION=$(sed -n 's/.*MARKETING_VERSION = \(.*\);/\1/p' "$PROJECT_PATH/project.pbxproj" | head -1 | tr -d ' ')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION" >> "$GITHUB_ENV"
          echo "Version: $VERSION"
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = ${GITHUB_RUN_NUMBER};/g" \
            "$PROJECT_PATH/project.pbxproj"

      # ── Archive ──
      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath build/$APP_NAME.xcarchive \
            -quiet \
            CODE_SIGN_STYLE=Manual \
            "CODE_SIGN_IDENTITY=Developer ID Application"

      # ── Export ──
      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath build/$APP_NAME.xcarchive \
            -exportOptionsPlist scripts/ExportOptions.plist \
            -exportPath build/export \
            -quiet

      # ── 公証（App） ──
      - name: Store notary credentials
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8: ${{ secrets.NOTARY_KEY_P8 }}
        run: |
          mkdir -p ~/private_keys
          echo "$NOTARY_KEY_P8" > ~/private_keys/AuthKey_${NOTARY_KEY_ID}.p8
          xcrun notarytool store-credentials "notary-profile" \
            --key ~/private_keys/AuthKey_${NOTARY_KEY_ID}.p8 \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID"

      - name: Notarize app
        run: |
          ditto -c -k --keepParent \
            "build/export/$APP_NAME.app" \
            "build/$APP_NAME.zip"
          xcrun notarytool submit "build/$APP_NAME.zip" \
            --keychain-profile "notary-profile" \
            --wait

      - name: Staple app
        run: xcrun stapler staple "build/export/$APP_NAME.app"

      # ── DMG 作成 ──
      - name: Create DMG
        run: |
          mkdir -p build/dmg-staging
          cp -R "build/export/$APP_NAME.app" build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder build/dmg-staging \
            -ov -format UDZO \
            "build/$APP_NAME.dmg"
          rm -rf build/dmg-staging

      # ── 公証（DMG） ──
      - name: Notarize DMG
        run: |
          xcrun notarytool submit "build/$APP_NAME.dmg" \
            --keychain-profile "notary-profile" \
            --wait

      - name: Staple DMG
        run: xcrun stapler staple "build/$APP_NAME.dmg"

      # ── Sparkle 署名 ──
      - name: Sign DMG with Sparkle EdDSA key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -path "*/sparkle/Sparkle/bin/sign_update" -print -quit 2>/dev/null || true)
          if [ -z "$SPARKLE_BIN" ]; then
            echo "::error::sign_update not found"
            exit 1
          fi
          SPARKLE_SIG=$("$SPARKLE_BIN" "build/$APP_NAME.dmg" --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY"))
          echo "SPARKLE_SIG<<EOF" >> "$GITHUB_ENV"
          echo "$SPARKLE_SIG" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          DMG_SIZE=$(stat -f%z "build/$APP_NAME.dmg")
          echo "DMG_SIZE=$DMG_SIZE" >> "$GITHUB_ENV"

      # ── appcast.xml 更新 ──
      - name: Update appcast.xml
        shell: bash
        run: |
          SPARKLE_ATTRS=$(echo "$SPARKLE_SIG" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S %z')
          DMG_URL="https://github.com/sawasige/clipnyx/releases/download/${TAG}/${APP_NAME}.dmg"
          python3 -c "
          import sys
          appcast = open('docs/appcast.xml').read()
          item = '''    <item>
              <title>${VERSION}</title>
              <pubDate>${PUB_DATE}</pubDate>
              <sparkle:version>${GITHUB_RUN_NUMBER}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <enclosure url=\"${DMG_URL}\" length=\"${DMG_SIZE}\" type=\"application/octet-stream\" sparkle:edSignature=\"${SPARKLE_ATTRS}\" />
            </item>'''
          marker = '<!-- Items are prepended by CI on each release -->'
          appcast = appcast.replace(marker, item + '\n    ' + marker)
          open('docs/appcast.xml', 'w').write(appcast)
          "

      # ── appcast.xml コミット ──
      - name: Commit appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/appcast.xml
          git commit -m "appcast.xml を v${VERSION} に更新"
          git push origin HEAD:main

      # ── Homebrew Cask 更新（外部タップリポ） ──
      - name: Update Homebrew Cask formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 "build/$APP_NAME.dmg" | awk '{print $1}')
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/sawasige/homebrew-clipnyx.git" /tmp/homebrew-clipnyx
          cd /tmp/homebrew-clipnyx
          sed -i '' -E "s/^(  version ).*/\1\"${VERSION}\"/" Casks/clipnyx.rb
          sed -i '' -E "s/^(  sha256 ).*/\1\"${SHA256}\"/" Casks/clipnyx.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/clipnyx.rb
          git commit -m "Cask を v${VERSION} に更新"
          git push origin main

      # ── タグ作成 ──
      - name: Create and push tag
        run: |
          git tag "$TAG"
          git push origin "$TAG"

      # ── GitHub Release ──
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            "build/$APP_NAME.dmg" \
            --title "$APP_NAME $VERSION" \
            --generate-notes

      # ── GitHub Pages デプロイトリガー ──
      - name: Trigger GitHub Pages deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            gh workflow run pages.yml --repo ${{ github.repository }} && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      # ── クリーンアップ ──
      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
